services:
  blindtest:
    build: ./blindtest
    container_name: app_blindtest
    labels:
      - traefik.enable=true
      - traefik.http.routers.blindtest.entrypoints=websecure
      - traefik.http.routers.blindtest.rule=Host(`blindtest.fr`)
      - traefik.http.routers.blindtest.tls=true
      - traefik.http.routers.blindtest.tls.certresolver=production
      - traefik.http.services.blindtest-service.loadbalancer.server.port=8000
    env_file:
      - ./docker/environment/django.env
      - ./docker/environment/global.env
      - ./docker/environment/redis.env
    volumes:
      - ./blindtest:/code
      - ./blindtest/media:/code/media:rw
    networks:
      - blindtest
  
  frontend:
    build: ./frontend
    container_name: app_frontend
    command: pnpm run preview --host 0.0.0.0
    ports:
      - 4173:4173
    networks:
      - blindtest

  # db:
  #   build: ./docker/database
  #   container_name: app_database
  #   env_file: ./docker/environment/postgres.env
  #   restart: always
  #   ports:
  #     - 5432:5432
  #   volumes:
  #     - PostgresData:/var/lib/postgresql/data/
  #   networks:
  #     - blindtest
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -h localhost -U $$DB_USER -d $$DB_NAME"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  
  redis:
    build: ./docker/redis
    container_name: app_redis
    restart: always
    # https://stackoverflow.com/questions/68461172/docker-compose-redis-password-via-environment-variable
    ports:
      - 6379:6379
    volumes:
      - RedisData:/data
      # - ~/var/redis.log:/data/redis.log:rw
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - blindtest

  rabbitmq:
    image: rabbitmq:management
    container_name: app_rabbitmq
    restart: always
    env_file:
      - ./docker/environment/rabbitmq.env
    ports:
      - 5672:5672
      - 15672:15672
    networks:
      - blindtest

networks:
  blindtest:
    driver: bridge

volumes:
    RedisData: {}
